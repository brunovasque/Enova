name: PR Checklist Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description recommended fields
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || "").toLowerCase();

            const recommended = [
              "pr:",
              "branch:",
              "commit:",
              "smoke tests:",
              "rollback:"
            ];

            const missing = recommended.filter(k => !body.includes(k));

            if (missing.length) {
              core.warning(
                `PR description is missing recommended fields: ${missing.join(", ")}\n` +
                `\nRecommended PR body block:\n` +
                `PR: <number>\nBranch: <name>\nCommit: <hash>\nSmoke tests: <what you ran>\nRollback: <command>\n`
              );
            } else {
              core.info("OK: PR description contains all recommended fields.");
            }
