name = "nv-enova"
main = "Enova worker.js"
compatibility_date = "2025-01-01"
keep_vars = true

[observability]
enabled = true
head_sampling_rate = 1

[vars]
DEBUG_META_WEBHOOK = "1"
CORR_TEMPLATE_NAME = "enova_novo_caso_correspondente"
CORR_TEMPLATE_LANG = "pt_BR"
CORRESPONDENTE_TEXT_FALLBACK_WINDOW_OPEN = "false"
COGNITIVE_V2_MODE = "on"

[[r2_buckets]]
binding = "CORRESPONDENTE_DOCS_BUCKET"
bucket_name = "enova-correspondente-docs"

[env.test]
name = "nv-enova-test"

[env.test.observability]
enabled = true
head_sampling_rate = 1

[env.test.vars]
DEBUG_META_WEBHOOK = "1"
CORR_TEMPLATE_NAME = "enova_novo_caso_correspondente"
CORR_TEMPLATE_LANG = "pt_BR"
CORRESPONDENTE_TEXT_FALLBACK_WINDOW_OPEN = "false"

[[env.test.r2_buckets]]
binding = "CORRESPONDENTE_DOCS_BUCKET"
bucket_name = "enova-correspondente-docs"
